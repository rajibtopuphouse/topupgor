<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajib Top-Up House</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:#fff;
margin:0;
padding:20px;
}
.container{
max-width:500px;
margin:auto;
background:#1f2937;
padding:20px;
border-radius:10px;
}
h1{
text-align:center;
color:#00ff99;
}
input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
}
button{
background:#00c853;
color:white;
font-size:18px;
cursor:pointer;
}
.payment{
background:#374151;
padding:10px;
margin-top:20px;
border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>Rajib Top-Up House</h1>

<p>Free Fire Diamond Top-Up</p>

<input type="text" placeholder="আপনার Free Fire UID লিখুন">

<select>
<option>25 Diamond - ৳25</option>
<option>50 Diamond - ৳45</option>
<option>115 Diamond - ৳85</option>
<option>240 Diamond - ৳170</option>
<option>610 Diamond - ৳420</option>
<option>1240 Diamond - ৳830</option>
</select>

<div class="payment">
<h3>Payment</h3>
<p><b>bKash:</b> 01XXXXXXXXX</p>
<p><b>Nagad:</b> 01XXXXXXXXX</p>
</div>

<input type="text" placeholder="Transaction ID">

<button>Order Submit</button>

</div>

</body>
</html>
